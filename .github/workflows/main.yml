name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install Buildozer Action
      uses: ArtemSanya/buildozer-action@v1
      with:
        buildozer_version: stable
        command: android debug
        repository_root: .

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Bocsh-App-APK
        path: bin/*.apk
